<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings — Ngāti Pakahi O Mangaiti</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
</head>
<body>
<script src="app.js"></script>
<script>requireAuth().then(() => { renderHeader('bookings'); init(); });</script>

<main>
  <div class="two-col" style="align-items:start">

    <!-- Calendar -->
    <div class="card">
      <div class="card-title">📅 Availability Calendar</div>

      <div class="cal-nav">
        <button id="prev-month">&#8249;</button>
        <strong id="cal-month-label"></strong>
        <button id="next-month">&#8250;</button>
      </div>

      <div class="calendar-grid" id="cal-headers"></div>
      <div class="calendar-grid" id="cal-grid"></div>

      <div class="legend mt-12">
        <div class="legend-item"><div class="legend-dot" style="background:#fde8e8;border:1px solid #e0b0b0"></div> Fully booked</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fff3cd;border:1px solid #e0d080"></div> Partially booked</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--koru-green)"></div> Today</div>
        <div class="legend-item"><div class="cal-dot dot-hall" style="position:static;display:inline-block"></div> Hall</div>
        <div class="legend-item"><div class="cal-dot dot-meetinghouse" style="position:static;display:inline-block"></div> Meeting House</div>
      </div>
    </div>

    <!-- Booking form + list -->
    <div>
      <div class="card">
        <div class="card-title">+ New Booking</div>
        <form id="booking-form">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="b-name" required />
          </div>
          <div class="form-group">
            <label>Venue</label>
            <select id="b-venue" required>
              <option value="">— Select venue —</option>
              <option value="hall">🏛 Hall</option>
              <option value="meetinghouse">🏠 Meeting House</option>
            </select>
          </div>
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="b-start-date" required />
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="date" id="b-end-date" required />
          </div>
          <div class="form-group">
            <label>Purpose / Event Name</label>
            <input type="text" id="b-purpose" placeholder="e.g. Birthday, Hui, Tangi…" required />
          </div>
          <div class="form-group">
            <label>Contact details (not shown publicly)</label>
            <textarea id="b-contact" rows="2" placeholder="Phone, email, or any contact details…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Confirm Booking</button>
          <p id="booking-msg" style="margin-top:10px;font-size:0.88rem;display:none"></p>
        </form>
      </div>

      <div class="card mt-20">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('all',this)">All Bookings</button>
          <button class="tab-btn" onclick="switchTab('mine',this)">My Bookings</button>
        </div>
        <div class="tab-panel active" id="tab-all"></div>
        <div class="tab-panel" id="tab-mine"></div>
      </div>
    </div>

  </div>
</main>

<footer>
  <p>Ngāti Pakahi O Mangaiti &mdash; He kāhui, he whānau, he iwi.</p>
</footer>

<script>
  let currentYear, currentMonth;

  async function init() {
    const now = new Date();
    currentYear  = now.getFullYear();
    currentMonth = now.getMonth();

    // Pre-fill name from session
    const currentUser = await getUser();
    document.getElementById('b-name').value = currentUser.name;

    await renderCalendar();
    await renderBookingLists();

    document.getElementById('prev-month').addEventListener('click', async () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } await renderCalendar(); });
    document.getElementById('next-month').addEventListener('click', async () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } await renderCalendar(); });
    document.getElementById('booking-form').addEventListener('submit', handleBooking);
  }

  // ── Calendar ────────────────────────────────────────────────────────────
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  async function renderCalendar() {
    document.getElementById('cal-month-label').textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;

    // Headers
    document.getElementById('cal-headers').innerHTML = DAY_NAMES.map(d => `<div class="cal-header">${d}</div>`).join('');

    const bookings = await getBookings();
    const today = new Date().toISOString().slice(0,10);
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    let html = '';
    for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      // A day is within a booking if: start_date <= day < end_date (exclusive end)
      const dayBookings = bookings.filter(b => b.start_date <= dateStr && b.end_date > dateStr);
      const hasHall = dayBookings.some(b => b.venue === 'hall');
      const hasMH   = dayBookings.some(b => b.venue === 'meetinghouse');
      const full    = hasHall && hasMH;
      const partial = (hasHall || hasMH) && !full;

      let cls = 'cal-day';
      if (dateStr === today) cls += ' today';
      else if (full)    cls += ' booked-full';
      else if (partial) cls += ' booked-partial';

      const dots = (hasHall ? `<div class="cal-dot dot-hall"></div>` : '') +
                   (hasMH   ? `<div class="cal-dot dot-meetinghouse"></div>` : '');

      html += `<div class="${cls}" onclick="selectDate('${dateStr}')" title="${dateStr}">${d}${dots}</div>`;
    }

    document.getElementById('cal-grid').innerHTML = html;
  }

  function selectDate(dateStr) {
    document.getElementById('b-start-date').value = dateStr;
    document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
  }

  // ── Booking form ────────────────────────────────────────────────────────
  async function handleBooking(e) {
    e.preventDefault();
    const name      = document.getElementById('b-name').value.trim();
    const venue     = document.getElementById('b-venue').value;
    const startDate = document.getElementById('b-start-date').value;
    const endDate   = document.getElementById('b-end-date').value;
    const purpose   = document.getElementById('b-purpose').value.trim();
    const contact   = document.getElementById('b-contact').value.trim();
    const msg       = document.getElementById('booking-msg');

    if (endDate <= startDate) {
      msg.style.display = 'block';
      msg.style.color = '#c0392b';
      msg.textContent = '⚠️ End date must be after start date.';
      return;
    }

    const bookings = await getBookings();
    const conflict = bookings.find(b =>
      b.venue === venue && bookingsOverlap(b.start_date, b.end_date, startDate, endDate)
    );
    if (conflict) {
      msg.style.display = 'block';
      msg.style.color = '#c0392b';
      msg.textContent = `⚠️ That venue is already booked for overlapping dates (${formatDate(conflict.start_date)} – ${formatDate(conflict.end_date)}) by ${conflict.booked_by}.`;
      return;
    }

    const { error } = await supabase
      .from('bookings')
      .insert({ venue, start_date: startDate, end_date: endDate, event_name: purpose, booked_by: name, contact });

    if (error) {
      msg.style.display = 'block';
      msg.style.color = '#c0392b';
      msg.textContent = '⚠️ Failed to save booking. Please try again.';
      console.error('insert error:', error);
      return;
    }

    msg.style.display = 'block';
    msg.style.color = 'var(--koru-green)';
    msg.textContent = `✅ Booking confirmed for ${formatDate(startDate)} – ${formatDate(endDate)}!`;
    e.target.reset();
    const currentUser = await getUser();
    document.getElementById('b-name').value = currentUser.name;

    await renderCalendar();
    await renderBookingLists();
  }

  // ── Booking lists ───────────────────────────────────────────────────────
  async function renderBookingLists() {
    const all  = (await getBookings()).sort((a,b) => a.start_date.localeCompare(b.start_date));
    const currentUser = await getUser();
    const mine = all.filter(b => b.booked_by === currentUser.name);
    document.getElementById('tab-all').innerHTML  = renderList(all);
    document.getElementById('tab-mine').innerHTML = renderList(mine, true);
  }

  function renderList(list, showDelete = false) {
    if (!list.length) return '<p class="text-muted">No bookings found.</p>';
    return list.map(b => `
      <div class="booking-item">
        <div>
          <strong>${b.event_name}</strong>
          <div class="text-muted" style="font-size:0.82rem">${formatDate(b.start_date)} &ndash; ${formatDate(b.end_date)} &mdash; ${b.booked_by}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="venue-tag ${b.venue === 'hall' ? 'tag-hall' : 'tag-mh'}">
            ${b.venue === 'hall' ? '🏛 Hall' : '🏠 Meeting House'}
          </span>
          ${showDelete ? `<button onclick="deleteBooking(${b.id})" style="background:none;border:none;cursor:pointer;color:#c0392b;font-size:1rem" title="Cancel">✕</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  async function deleteBooking(id) {
    if (!confirm('Cancel this booking?')) return;
    const { error } = await supabase.from('bookings').delete().eq('id', id);
    if (error) { console.error('deleteBooking error:', error); return; }
    await renderCalendar();
    await renderBookingLists();
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
  }

  function formatDate(d) {
    return new Date(d).toLocaleDateString('en-NZ', { day:'numeric', month:'long', year:'numeric' });
  }

  // init() is called from requireAuth().then() in the script tag above
</script>
</body>
</html>
