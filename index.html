<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ngāti Pakahi O Mangaiti</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">🌿</div>
    <h1>Ngāti Pakahi O Mangaiti</h1>
    <p class="subtitle">Ko te kāhui o tātou whānau — The gathering place of our family</p>

    <!-- Status message (shown after form submission) -->
    <div id="gate-status" style="display:none;background:#e8f5e8;border:1px solid #b0c8a8;border-radius:8px;padding:14px 18px;margin-bottom:18px;color:#2d5a27;font-weight:600;text-align:center;"></div>

    <!-- Code entry section (shown after a sign-in email is sent) -->
    <div id="code-section" style="display:none">
      <h2 style="font-size:1.05rem;color:var(--koru-green);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">Enter your code</h2>
      <p style="font-size:0.9rem;color:#555;margin-bottom:12px">We emailed you a 6-digit code. Enter it below to sign in.</p>
      <form id="code-form">
        <div class="form-group">
          <label for="code-input">6-digit code</label>
          <input type="text" id="code-input" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">
          Verify &amp; sign in
        </button>
        <p class="error-msg" id="code-error"></p>
      </form>
    </div>

    <!-- Registration section (new users) -->
    <div id="register-section">
      <h2 style="font-size:1.05rem;color:var(--koru-green);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">New to the site? Register here</h2>
      <form id="register-form">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" required />
        </div>
        <div class="form-group">
          <label for="reg-birth-year">Birth Year</label>
          <input type="number" id="reg-birth-year" min="1900" max="2099" required />
        </div>
        <div class="form-group">
          <label for="reg-parent-name">Parent's Name</label>
          <input type="text" id="reg-parent-name" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">
          Register &amp; get sign-in link
        </button>
        <p class="error-msg" id="register-error"></p>
      </form>
    </div>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:12px;margin:22px 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="color:#888;font-size:0.85rem">Already registered?</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>

    <!-- Returning user section -->
    <div id="login-section">
      <h2 style="font-size:1.05rem;color:var(--koru-green);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">Sign in</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">
          Send sign-in link
        </button>
        <p class="error-msg" id="login-error"></p>
      </form>
    </div>

  </div>
</div>

<script>
  // Email currently awaiting code verification (set on register/login submit)
  let pendingEmail = null;

  // ── Show error message if magic link was invalid/expired ────────────────
  // Supabase puts errors in the URL hash like #error=access_denied&error_description=otp_expired
  (function showHashError() {
    const hash = window.location.hash;
    if (!hash || !hash.includes('error=')) return;
    const params = new URLSearchParams(hash.replace(/^#/, ''));
    const errorDescription = params.get('error_description') || params.get('error') || 'Sign-in link is invalid';
    const friendly = errorDescription.includes('expired')
      ? 'Your sign-in link has expired or already been used. Please request a new one below.'
      : 'There was a problem with your sign-in link: ' + errorDescription.replace(/\+/g, ' ') + '. Please request a new one below.';
    // Show via the existing gate-status banner once DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      const el = document.getElementById('gate-status');
      if (!el) return;
      el.textContent = '⚠️ ' + friendly;
      el.style.background = '#fdecea';
      el.style.borderColor = '#e8a8a0';
      el.style.color = '#8b2818';
      el.style.display = 'block';
    });
    // Clean the URL so a refresh doesn't re-show the message
    history.replaceState(null, '', window.location.pathname);
  })();

  // ── Auth callback ──────────────────────────────────────────────────────
  // Fires when Supabase establishes a session — either from the #access_token
  // hash fragment in a magic link, or from verifyOtp() after the user enters
  // their 6-digit code. Either way we ensure the whakapapa row exists, then
  // redirect to home.html.
  //
  // IMPORTANT: the redirect must happen even if the database calls fail or
  // hang. Previously a slow/failed whakapapa query would silently prevent the
  // redirect, leaving the user stuck on the login page with a valid session.
  let redirecting = false;

  function goHome() {
    if (redirecting) return;
    redirecting = true;
    window.location.href = 'home.html';
  }

  supabase.auth.onAuthStateChange(async (event, session) => {
    if (!session) return;

    // Safety net: no matter what happens below, land on home.html within 4s.
    setTimeout(goHome, 4000);

    try {
      // Does this user already have a whakapapa row?
      const { data: rows } = await supabase
        .from('whakapapa')
        .select('id')
        .eq('auth_user_id', session.user.id)
        .limit(1);

      if (rows && rows.length > 0) {
        goHome();
        return;
      }

      // New user — create whakapapa row from localStorage registration data
      const name        = localStorage.getItem('reg_name');
      const birth_year  = parseInt(localStorage.getItem('reg_birth_year')) || null;
      const parent_name = localStorage.getItem('reg_parent_name');

      if (name && parent_name) {
        const { data: parentRows } = await supabase
          .from('whakapapa')
          .select('id')
          .ilike('name', parent_name)
          .limit(1);

        const parent_id = parentRows?.length ? parentRows[0].id : null;

        await supabase.from('whakapapa').upsert({
          name,
          email: session.user.email,
          birth_year,
          parent_name,
          parent_id,
          auth_user_id: session.user.id
        }, { onConflict: 'auth_user_id', ignoreDuplicates: true });

        localStorage.removeItem('reg_name');
        localStorage.removeItem('reg_birth_year');
        localStorage.removeItem('reg_parent_name');
      }
    } catch (err) {
      // Log but don't block — the safety-net timeout (and the call below)
      // still send the user to home.html.
      console.error('Post-sign-in setup failed (continuing to home):', err);
    }

    goHome();
  });

  // Belt-and-braces: if a session already exists when the page loads (e.g. the
  // magic-link hash was processed before the listener attached, or the user is
  // already signed in), redirect immediately rather than showing the gate.
  (async function checkExistingSession() {
    // Skip if the URL carries an explicit error (handled above).
    if (window.location.hash.includes('error=')) return;
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) goHome();
    } catch (err) {
      console.error('Session check failed:', err);
    }
  })();


  // ── Registration form ──────────────────────────────────────────────────
  document.getElementById('register-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const name       = document.getElementById('reg-name').value.trim();
    const email      = document.getElementById('reg-email').value.trim();
    const birth_year = document.getElementById('reg-birth-year').value.trim();
    const parentName = document.getElementById('reg-parent-name').value.trim();
    const errEl      = document.getElementById('register-error');
    errEl.style.display = 'none';

    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: {
        shouldCreateUser: true,
        emailRedirectTo: 'https://mikeartee.github.io/ngati-pakahi-portal/index.html'
      }
    });

    if (error) {
      let msg = error.message;
      if (error.status === 429) msg = 'Too many sign-in attempts. Please wait a few minutes and try again.';
      errEl.textContent = '⚠️ ' + msg;
      errEl.style.display = 'block';
      return;
    }

    // Store registration data in localStorage so it survives the magic link
    // opening in a new tab or on a different device.
    localStorage.setItem('reg_name', name);
    localStorage.setItem('reg_birth_year', birth_year);
    localStorage.setItem('reg_parent_name', parentName);

    // Remember which email we're verifying, then show the code entry form.
    pendingEmail = email;
    showCodeEntry('Check your email for a 6-digit sign-in code');
  });

  // ── Login form ─────────────────────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: {
        shouldCreateUser: false,
        emailRedirectTo: 'https://mikeartee.github.io/ngati-pakahi-portal/index.html'
      }
    });

    if (error) {
      let msg = error.message;
      if (error.status === 429) msg = 'Too many sign-in attempts. Please wait a few minutes and try again.';
      errEl.textContent = '⚠️ ' + msg;
      errEl.style.display = 'block';
      return;
    }

    pendingEmail = email;
    showCodeEntry('Check your email for a 6-digit sign-in code');
  });

  // ── Code verification form ───────────────────────────────────────────────
  // The email contains a 6-digit code as well as a link. Entering the code
  // avoids the problem where mail-provider security scanners "click" (and
  // thereby consume) the single-use magic link before the user can.
  document.getElementById('code-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const token = document.getElementById('code-input').value.trim();
    const errEl = document.getElementById('code-error');
    errEl.style.display = 'none';

    if (!pendingEmail) {
      errEl.textContent = '⚠️ Please request a sign-in code first.';
      errEl.style.display = 'block';
      return;
    }

    const { error } = await supabase.auth.verifyOtp({
      email: pendingEmail,
      token,
      type: 'email'
    });

    if (error) {
      let msg = error.message;
      if (error.status === 429) msg = 'Too many attempts. Please wait a few minutes and try again.';
      errEl.textContent = '⚠️ ' + msg;
      errEl.style.display = 'block';
      return;
    }
    // On success, onAuthStateChange fires with the new session and handles
    // the whakapapa row + redirect to home.html.
  });

  function showStatus(msg) {
    const el = document.getElementById('gate-status');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('register-section').style.display = 'none';
    document.getElementById('login-section').style.display = 'none';
  }

  function showCodeEntry(msg) {
    showStatus(msg);
    document.getElementById('code-section').style.display = 'block';
    const input = document.getElementById('code-input');
    if (input) input.focus();
  }
</script>
</body>
</html>
