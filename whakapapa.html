<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whakapapa — Ngāti Pakahi O Mangaiti</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <style>
    .tree-wrap { overflow: auto; background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; min-height: 500px; }
    .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
    .search-bar input { flex: 1; }
    .highlight rect { stroke: var(--gold) !important; stroke-width: 3px !important; }
    .gen-label { font-size: 0.72rem; fill: #888; font-style: italic; }
    .popup-edit-section { margin-top: 12px; border-top: 1px solid #e0d8cc; padding-top: 12px; }
    .popup-edit-section label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 2px; }
    .popup-edit-section input { width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
    .popup-save-btn { width: 100%; }
  </style>
</head>
<body>
<script src="app.js"></script>
<script>requireAuth().then(() => { renderHeader('whakapapa'); initPage(); });</script>

<main>
  <div class="card" style="margin-bottom:20px">
    <div class="flex-between">
      <div class="card-title" style="border:none;margin:0;padding:0">🌳 Whakapapa — Family Tree</div>
    </div>
    <p class="text-muted mt-12">Click any person to see their details. The tree flows from our matriarch at the top.</p>

    <div class="search-bar mt-12">
      <input type="text" id="search-input" placeholder="Search by name…" />
      <button class="btn btn-primary" onclick="searchTree()">Search</button>
      <button class="btn btn-outline" onclick="clearSearch()">Clear</button>
    </div>
  </div>

  <div class="tree-wrap" id="tree-wrap">
    <svg id="tree-svg"></svg>
  </div>
</main>

<!-- Person popup -->
<div class="person-card-popup" id="person-popup">
  <button class="popup-close" onclick="closePopup()">✕</button>
  <h3 id="pp-name"></h3>
  <p id="pp-birth"></p>
  <p id="pp-relation"></p>
  <p id="pp-children"></p>
  <div id="pp-edit-section" class="popup-edit-section" style="display:none">
    <label for="pp-edit-birth">Birth Year</label>
    <input type="number" id="pp-edit-birth" placeholder="e.g. 1950" />
    <label for="pp-edit-death">Death Year</label>
    <input type="number" id="pp-edit-death" placeholder="Leave blank if living" />
    <button class="btn btn-primary popup-save-btn" id="pp-save-btn">Save</button>
  </div>
</div>

<footer>
  <p>Ngāti Pakahi O Mangaiti &mdash; He kāhui, he whānau, he iwi.</p>
</footer>

<script>
// ── Layout engine ──────────────────────────────────────────────────────────
const NODE_W = 150, NODE_H = 52, H_GAP = 20, V_GAP = 70;

// In-memory people array — loaded once on page load, refreshed after edits
let _people = [];
// Set of person ids the current user may edit
let _editableIds = new Set();

function buildLayout(people) {
  // Group by generation depth using parent_id
  const depthMap = {};
  function depth(id) {
    if (depthMap[id] !== undefined) return depthMap[id];
    const p = people.find(x => x.id === id);
    if (!p || p.parent_id === null) { depthMap[id] = 0; return 0; }
    depthMap[id] = depth(p.parent_id) + 1;
    return depthMap[id];
  }
  people.forEach(p => depth(p.id));

  const maxDepth = Math.max(...Object.values(depthMap));
  const rows = [];
  for (let d = 0; d <= maxDepth; d++) {
    rows.push(people.filter(p => depthMap[p.id] === d));
  }

  // Assign x positions per row
  const positions = {};
  rows.forEach((row, d) => {
    const totalW = row.length * NODE_W + (row.length - 1) * H_GAP;
    row.forEach((p, i) => {
      positions[p.id] = {
        x: i * (NODE_W + H_GAP),
        y: d * (NODE_H + V_GAP),
        rowWidth: totalW,
        depth: d,
      };
    });
  });

  // Centre each row relative to the widest row
  const maxRowW = Math.max(...rows.map(r => r.length * NODE_W + (r.length - 1) * H_GAP));
  rows.forEach(row => {
    const rowW = row.length * NODE_W + (row.length - 1) * H_GAP;
    const offset = (maxRowW - rowW) / 2;
    row.forEach(p => { positions[p.id].x += offset; });
  });

  return { positions, maxDepth, maxRowW, rows };
}

// ── Render SVG ─────────────────────────────────────────────────────────────
function renderTree(people) {
  _people = people;
  const svg = document.getElementById('tree-svg');

  if (!people.length) {
    svg.setAttribute('width', '300');
    svg.setAttribute('height', '60');
    svg.innerHTML = '';
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', '150');
    text.setAttribute('y', '35');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('font-size', '14');
    text.setAttribute('fill', '#888');
    text.setAttribute('font-family', 'Segoe UI, sans-serif');
    text.textContent = 'No members found.';
    svg.appendChild(text);
    return;
  }

  const { positions, maxDepth, maxRowW } = buildLayout(people);

  const svgW = maxRowW + 40;
  const svgH = (maxDepth + 1) * (NODE_H + V_GAP) + 20;

  const svg = document.getElementById('tree-svg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.innerHTML = '';

  const PAD = 20;

  // Draw edges first
  people.forEach(p => {
    if (p.parent_id === null) return;
    const child  = positions[p.id];
    const parent = positions[p.parent_id];
    if (!parent) return;
    const x1 = parent.x + NODE_W / 2 + PAD;
    const y1 = parent.y + NODE_H + PAD;
    const x2 = child.x  + NODE_W / 2 + PAD;
    const y2 = child.y  + PAD;
    const my = (y1 + y2) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#b0c8a8');
    path.setAttribute('stroke-width', '2');
    svg.appendChild(path);
  });

  // Draw nodes
  people.forEach(p => {
    const pos = positions[p.id];
    const x = pos.x + PAD, y = pos.y + PAD;
    const isRoot = p.parent_id === null;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'tree-node-group');
    g.setAttribute('data-id', p.id);
    g.addEventListener('click', (e) => showPopup(p, e));

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', NODE_W); rect.setAttribute('height', NODE_H);
    rect.setAttribute('rx', '8');
    rect.setAttribute('fill', isRoot ? '#2d5a27' : (pos.depth % 2 === 0 ? '#e8f5e8' : '#f5ede3'));
    rect.setAttribute('stroke', isRoot ? '#1a3a18' : '#c9a84c');
    rect.setAttribute('stroke-width', isRoot ? '2.5' : '1.5');
    g.appendChild(rect);

    // Name text
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', x + NODE_W / 2);
    text.setAttribute('y', y + (p.birth_year ? 20 : 28));
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('font-size', '12');
    text.setAttribute('font-weight', '700');
    text.setAttribute('fill', isRoot ? 'white' : '#1a1a1a');
    text.setAttribute('font-family', 'Segoe UI, sans-serif');
    const displayName = p.name.length > 20 ? p.name.slice(0, 19) + '…' : p.name;
    text.textContent = displayName;
    g.appendChild(text);

    if (p.birth_year) {
      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sub.setAttribute('x', x + NODE_W / 2);
      sub.setAttribute('y', y + 36);
      sub.setAttribute('text-anchor', 'middle');
      sub.setAttribute('font-size', '10');
      sub.setAttribute('fill', isRoot ? 'rgba(255,255,255,0.75)' : '#888');
      sub.setAttribute('font-family', 'Segoe UI, sans-serif');
      sub.textContent = p.death_year ? `${p.birth_year} – ${p.death_year}` : `b. ${p.birth_year}`;
      g.appendChild(sub);
    }

    svg.appendChild(g);
  });
}

// ── Popup ──────────────────────────────────────────────────────────────────
function showPopup(person, e) {
  const people = _people;
  const children = people.filter(p => p.parent_id === person.id);
  const parent   = people.find(p => p.id === person.parent_id);

  document.getElementById('pp-name').textContent    = person.name;
  document.getElementById('pp-birth').textContent   = person.birth_year
    ? `Born: ${person.birth_year}${person.death_year ? ' · Died: ' + person.death_year : ''}`
    : '';
  document.getElementById('pp-relation').textContent = parent ? `Child of: ${parent.name}` : '👑 Matriarch';
  document.getElementById('pp-children').textContent = children.length
    ? `Children: ${children.map(c => c.name).join(', ')}`
    : '';

  const editSection = document.getElementById('pp-edit-section');
  if (_editableIds.has(person.id)) {
    document.getElementById('pp-edit-birth').value = person.birth_year || '';
    document.getElementById('pp-edit-death').value = person.death_year || '';
    document.getElementById('pp-save-btn').onclick = () => updatePersonDates(
      person.id,
      document.getElementById('pp-edit-birth').value,
      document.getElementById('pp-edit-death').value
    );
    editSection.style.display = 'block';
  } else {
    editSection.style.display = 'none';
  }

  const popup = document.getElementById('person-popup');
  popup.style.display = 'block';
  popup.style.left = Math.min(e.clientX + 12, window.innerWidth - 320) + 'px';
  popup.style.top  = Math.min(e.clientY + 12, window.innerHeight - 260) + 'px';
}

function closePopup() {
  document.getElementById('person-popup').style.display = 'none';
}

// ── Update birth/death years ───────────────────────────────────────────────
async function updatePersonDates(id, birthYear, deathYear) {
  const { error } = await supabase
    .from('whakapapa')
    .update({
      birth_year: birthYear ? parseInt(birthYear) : null,
      death_year: deathYear ? parseInt(deathYear) : null
    })
    .eq('id', id);
  if (error) { alert('Could not save changes.'); return; }
  // Reload tree
  const people = await getFamilyData();
  renderTree(people);
  closePopup();
}

// ── Search ─────────────────────────────────────────────────────────────────
function searchTree() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  document.querySelectorAll('.tree-node-group').forEach(g => {
    const id = parseInt(g.getAttribute('data-id'));
    const person = _people.find(p => p.id === id);
    g.classList.toggle('highlight', person && person.name.toLowerCase().includes(q) && q.length > 0);
  });
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.tree-node-group').forEach(g => g.classList.remove('highlight'));
}

// Close popup on outside click
document.addEventListener('click', e => {
  const popup = document.getElementById('person-popup');
  if (!popup.contains(e.target) && !e.target.closest('.tree-node-group')) closePopup();
});

// ── Page initialisation ────────────────────────────────────────────────────
async function initPage() {
  const [people, currentUser] = await Promise.all([getFamilyData(), getUser()]);

  // Build editable set: self, parent, children, siblings
  if (currentUser.id !== null) {
    // Self
    _editableIds.add(currentUser.id);
    // Parent
    if (currentUser.parent_id !== null) {
      _editableIds.add(currentUser.parent_id);
    }
    // Children (people whose parent_id === currentUser.id)
    people.forEach(p => {
      if (p.parent_id === currentUser.id) _editableIds.add(p.id);
    });
    // Siblings (same parent, not self)
    if (currentUser.parent_id !== null) {
      people.forEach(p => {
        if (p.parent_id === currentUser.parent_id && p.id !== currentUser.id) {
          _editableIds.add(p.id);
        }
      });
    }
  }

  renderTree(people);
}
</script>
</body>
</html>
